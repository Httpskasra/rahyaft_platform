services:
  postgres:
    image: postgres:16
    container_name: enterprise_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: enterprise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: enterprise_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
